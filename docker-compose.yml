# docker-compose.yml
version: '3.8'

services:
  db:
    image: postgres:17
    container_name: db
    restart: always
    env_file:
      - .env
    command:
      - "postgres"
      - "-c"
      - "fsync=off"
      - "-c"
      - "synchronous_commit=off"
      - "-c"
      - "full_page_writes=off"
      - "-c"
      - "max_wal_size=1GB"
      - "-c"
      - "maintenance_work_mem=256MB"
    ports:
      - "9000:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres:/docker-entrypoint-initdb.d 
    networks:
      - saude_net

volumes:
  postgres_data:
    driver: local

networks:
  saude_net:
    driver: bridge