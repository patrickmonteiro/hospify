# docker-compose.yml
version: '3.8'

services:
  db:
    image: postgres:17
    container_name: db
    restart: always
    env_file:
      - .env
    command: >
      postgres
      -c fsync=off
      -c synchronous_commit=off
      -c full_page_writes=off
      -c max_wal_size=1GB
      -c maintenance_work_mem=256MB
    ports:
      - "9000:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres:/docker-entrypoint-initdb.d
    networks:
      - saude_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  backend:
    build:
      # MUDANÇA 1: Define o "contexto" do build para a pasta ./backend
      # Docker irá procurar o Dockerfile dentro desta pasta.
      context: ./backend
    container_name: backend
    restart: always
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      # MUDANÇA 2: Monta a pasta ./backend no diretório /app do contêiner.
      # Agora, apenas o código do backend é sincronizado.
      - ./backend:/app
      # Montar arquivo de dados para importação em background
      - ./data/bulk_data.sql:/app/bulk_data.sql:ro
    networks:
      - saude_net
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hospify-frontend
    ports:
      - "3000:80"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    networks:
      - saude_net
    depends_on:
      - backend

volumes:
  postgres_data:
    driver: local

networks:
  saude_net:
    driver: bridge